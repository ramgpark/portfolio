<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=1320px">
    <title>BI Guide</title>

    <!-- 파비콘 -->
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">

    <!-- 외부 css 연결 -->
    <link rel="stylesheet" href="../css/guide_style.css" type="text/css">
</head>

<body>
    <div class="wrap">
        <img src="guide-img/BI/yaguroad_1.jpg" alt="guide">
        <img src="guide-img/BI/yaguroad_2.jpg" alt="guide">
        <img src="guide-img/BI/yaguroad_3.jpg" alt="guide">
        <img src="guide-img/BI/yaguroad_4.jpg" alt="guide">
        <img src="guide-img/BI/yaguroad_5.jpg" alt="guide">
        <img src="guide-img/BI/yaguroad_6.jpg" alt="guide">
        <img src="guide-img/BI/yaguroad_7.jpg" alt="guide">
        <img src="guide-img/BI/yaguroad_8.jpg" alt="guide">
        <img src="guide-img/BI/yaguroad_9.jpg" alt="guide">
        <img src="guide-img/BI/yaguroad_10.jpg" alt="guide">
    </div>

    <div class="top_btn">
        <a href="#">
            <img src="img/top_btn.png" alt="top">
        </a>
    </div>

    <div class="back_btn">
        <a href="../../index.html#branding" onclick="window.close()">
            <img src="img/back_btn.png" alt="back">
        </a>
    </div>

    <script type="text/javascript" src="http://ajax.googleapis.com/ajax/libs/jquery/1.4.3/jquery.min.js"></script>
    <script src="js/jquery-1.12.3.js"></script>

    <script>
        $(function () {
            $(".top_btn>a").click(function () {
                $('body,html').animate({
                    scrollTop: 0
                }, 500);
                return false;
            });
            $(window).scroll(function () {
                var height = $(window).scrollTop();
                if (height > 100) {
                    $('.top_btn').fadeIn();
                } else {
                    $('.top_btn').fadeOut();
                }
            });
        });
    </script>
</body>

</html>
